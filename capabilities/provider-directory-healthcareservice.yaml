naftiko: 1.0.0-alpha2
info:
  label: Cigna Provider Directory API — HealthcareService
  description: 'Cigna Provider Directory API — HealthcareService. 1 operations. Lead operation: Search healthcare services
    offered by Cigna network providers. Self-contained Naftiko capability covering one Cigna business surface.'
  tags:
  - Cigna
  - HealthcareService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIGNA_API_KEY: CIGNA_API_KEY
capability:
  consumes:
  - type: http
    namespace: provider-directory-healthcareservice
    baseUri: https://fhir.cigna.com/ProviderDirectory/v1
    description: Cigna Provider Directory API — HealthcareService business capability. Self-contained, no shared references.
    resources:
    - name: HealthcareService
      path: /HealthcareService
      operations:
      - name: searchhealthcareservice
        method: GET
        description: Search healthcare services offered by Cigna network providers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: provider-directory-healthcareservice-rest
    port: 8080
    description: REST adapter for Cigna Provider Directory API — HealthcareService. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/healthcareservice
      name: healthcareservice
      description: REST surface for HealthcareService.
      operations:
      - method: GET
        name: searchhealthcareservice
        description: Search healthcare services offered by Cigna network providers
        call: provider-directory-healthcareservice.searchhealthcareservice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: provider-directory-healthcareservice-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cigna Provider Directory API — HealthcareService. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: search-healthcare-services-offered-cigna
      description: Search healthcare services offered by Cigna network providers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: provider-directory-healthcareservice.searchhealthcareservice
      outputParameters:
      - type: object
        mapping: $.
