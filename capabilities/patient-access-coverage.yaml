naftiko: 1.0.0-alpha2
info:
  label: Cigna Patient Access API — Coverage
  description: 'Cigna Patient Access API — Coverage. 1 operations. Lead operation: Retrieve coverage records for the authenticated
    member. Self-contained Naftiko capability covering one Cigna business surface.'
  tags:
  - Cigna
  - Coverage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIGNA_API_KEY: CIGNA_API_KEY
capability:
  consumes:
  - type: http
    namespace: patient-access-coverage
    baseUri: https://fhir.cigna.com/PatientAccess/v1
    description: Cigna Patient Access API — Coverage business capability. Self-contained, no shared references.
    resources:
    - name: Coverage
      path: /Coverage
      operations:
      - name: searchcoverage
        method: GET
        description: Retrieve coverage records for the authenticated member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CIGNA_API_KEY}}'
  exposes:
  - type: rest
    namespace: patient-access-coverage-rest
    port: 8080
    description: REST adapter for Cigna Patient Access API — Coverage. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/coverage
      name: coverage
      description: REST surface for Coverage.
      operations:
      - method: GET
        name: searchcoverage
        description: Retrieve coverage records for the authenticated member
        call: patient-access-coverage.searchcoverage
        with:
          patient: rest.patient
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: patient-access-coverage-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cigna Patient Access API — Coverage. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-coverage-records-authenticated-member
      description: Retrieve coverage records for the authenticated member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: patient-access-coverage.searchcoverage
      with:
        patient: tools.patient
      outputParameters:
      - type: object
        mapping: $.
