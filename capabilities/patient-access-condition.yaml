naftiko: 1.0.0-alpha2
info:
  label: Cigna Patient Access API — Condition
  description: 'Cigna Patient Access API — Condition. 1 operations. Lead operation: Retrieve condition records for the authenticated
    member. Self-contained Naftiko capability covering one Cigna business surface.'
  tags:
  - Cigna
  - Condition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIGNA_API_KEY: CIGNA_API_KEY
capability:
  consumes:
  - type: http
    namespace: patient-access-condition
    baseUri: https://fhir.cigna.com/PatientAccess/v1
    description: Cigna Patient Access API — Condition business capability. Self-contained, no shared references.
    resources:
    - name: Condition
      path: /Condition
      operations:
      - name: searchcondition
        method: GET
        description: Retrieve condition records for the authenticated member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CIGNA_API_KEY}}'
  exposes:
  - type: rest
    namespace: patient-access-condition-rest
    port: 8080
    description: REST adapter for Cigna Patient Access API — Condition. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/condition
      name: condition
      description: REST surface for Condition.
      operations:
      - method: GET
        name: searchcondition
        description: Retrieve condition records for the authenticated member
        call: patient-access-condition.searchcondition
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: patient-access-condition-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cigna Patient Access API — Condition. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-condition-records-authenticated-member
      description: Retrieve condition records for the authenticated member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: patient-access-condition.searchcondition
      outputParameters:
      - type: object
        mapping: $.
