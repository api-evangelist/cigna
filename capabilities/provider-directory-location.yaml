naftiko: 1.0.0-alpha2
info:
  label: Cigna Provider Directory API — Location
  description: 'Cigna Provider Directory API — Location. 1 operations. Lead operation: Search locations of Cigna network providers.
    Self-contained Naftiko capability covering one Cigna business surface.'
  tags:
  - Cigna
  - Location
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIGNA_API_KEY: CIGNA_API_KEY
capability:
  consumes:
  - type: http
    namespace: provider-directory-location
    baseUri: https://fhir.cigna.com/ProviderDirectory/v1
    description: Cigna Provider Directory API — Location business capability. Self-contained, no shared references.
    resources:
    - name: Location
      path: /Location
      operations:
      - name: searchlocation
        method: GET
        description: Search locations of Cigna network providers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: address
          in: query
          type: string
        - name: address-postalcode
          in: query
          type: string
  exposes:
  - type: rest
    namespace: provider-directory-location-rest
    port: 8080
    description: REST adapter for Cigna Provider Directory API — Location. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/location
      name: location
      description: REST surface for Location.
      operations:
      - method: GET
        name: searchlocation
        description: Search locations of Cigna network providers
        call: provider-directory-location.searchlocation
        with:
          address: rest.address
          address-postalcode: rest.address-postalcode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: provider-directory-location-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cigna Provider Directory API — Location. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-locations-cigna-network-providers
      description: Search locations of Cigna network providers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: provider-directory-location.searchlocation
      with:
        address: tools.address
        address-postalcode: tools.address-postalcode
      outputParameters:
      - type: object
        mapping: $.
