naftiko: 1.0.0-alpha2
info:
  label: Cigna Patient Access API — MedicationRequest
  description: 'Cigna Patient Access API — MedicationRequest. 1 operations. Lead operation: Retrieve medication requests for
    the authenticated member. Self-contained Naftiko capability covering one Cigna business surface.'
  tags:
  - Cigna
  - MedicationRequest
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CIGNA_API_KEY: CIGNA_API_KEY
capability:
  consumes:
  - type: http
    namespace: patient-access-medicationrequest
    baseUri: https://fhir.cigna.com/PatientAccess/v1
    description: Cigna Patient Access API — MedicationRequest business capability. Self-contained, no shared references.
    resources:
    - name: MedicationRequest
      path: /MedicationRequest
      operations:
      - name: searchmedicationrequest
        method: GET
        description: Retrieve medication requests for the authenticated member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CIGNA_API_KEY}}'
  exposes:
  - type: rest
    namespace: patient-access-medicationrequest-rest
    port: 8080
    description: REST adapter for Cigna Patient Access API — MedicationRequest. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/medicationrequest
      name: medicationrequest
      description: REST surface for MedicationRequest.
      operations:
      - method: GET
        name: searchmedicationrequest
        description: Retrieve medication requests for the authenticated member
        call: patient-access-medicationrequest.searchmedicationrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: patient-access-medicationrequest-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cigna Patient Access API — MedicationRequest. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: retrieve-medication-requests-authenticated-member
      description: Retrieve medication requests for the authenticated member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: patient-access-medicationrequest.searchmedicationrequest
      outputParameters:
      - type: object
        mapping: $.
